<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LifePlus - Panel de Control Local</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --lp-green: #2d5a27;
            --lp-light-green: #ebf5eb;
            --lp-dark: #333;
        }
        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--lp-light-green);
            color: var(--lp-dark);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 500px;
            width: 90%;
        }
        h1 { color: var(--lp-green); margin-bottom: 1.5rem; }
        .btn {
            display: block;
            background: var(--lp-green);
            color: white;
            padding: 1rem;
            margin: 10px 0;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            transition: transform 0.2s, background 0.2s;
        }
        .btn:hover {
            background: #1e3d1a;
            transform: translateY(-2px);
        }
        .btn.secondary {
            background: #666;
        }
        .btn.secondary:hover {
            background: #444;
        }
        p { color: #666; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌿 LifePlus Local</h1>
        <p>Selecciona la versión del catálogo que deseas visualizar:</p>
        
        <a href="/catalogo_lifeplus_buscador_funcional.html" class="btn">🚀 Versión con Buscador Funcional (Recomendada)</a>
        <a href="/catalogo_lifeplus_final.html" class="btn">✨ Versión Final Standard</a>
        <a href="/catalogo_lifeplus_buscador_flotante.html" class="btn">🔍 Versión Buscador Flotante</a>
        
        <div style="margin-top: 2rem; padding-top: 1rem; border-top: 1px solid #eee;">
            <p>Servidor local activo en el puerto 55192</p>
        </div>
    </div>
</body>
</html>
